<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Describe your home page here using your keywords like your name">
    <meta name="author" content="Afolabi Eniola Naomi">
    <title>Form</title>
</head>

<body>
    <header>
        <nav>
            <a href="#">Home</a>
            <a href="week05/">Quiz Form</a>
            <link rel="stylesheet" href="styles/quiz.css">
        </nav>
    </header>
    <main>
        <h1>HTML & CSS Quiz</h1>
        <form>
            <div class="question">
                <label for="question"><span>1.</span> Whats the meaning of box-sizing?</label>
                <input type="text" id="q1" name="q1" required>
            </div>
            <div class="question">
                <label for="question"><span>2.</span> What is CSS used for?</label>
                <textarea id="q2" name="q2" rows="3"></textarea>
            </div>
            <div class="question">
                <label for="question"><span>3.</span> WHich HTML tag is used to create an ordered
                    list</label>
                <select name="q3" id="q3">
                    <option value="" disabled selected>Choose one...</option>
                    <option value="ul">ul</option>
                    <option value="ol">ol</option>
                    <option value="li">li</option>
                    <option value="il">il</option>
                </select>
            </div>
            <div class="question">
                <label for="question"><span>4.</span> What is the bottom margin given in this
                    declaration?</label>
                <code>margin: 10px 5px 15px</code>
                <input type="number" id="q4" name="q4">
            </div>
            <button type="submit">Submit Quiz</button>

        </form>
    </main>
</body>
