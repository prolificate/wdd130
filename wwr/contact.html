<body>

    <header>
        <div class="logo">
            <img src="images/rafting.jpeg" alt="Our Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about copy.html">About Us</a>
            <a href="trips.html">Trips</a>

    <main>
        <section class="company-info">
            <h1>Rapids Water Rafting Company</h1>
            <p>123 Ikeja Main Road</p>
            <p>Lagos, Nigeria</p>
            <p>+234 802 3456 789</p>
            <p>Rapids@hotmail.com</p>
        </section>

        <section class="contact">

            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15853.813051658715!2d3.3471232314140495!3d6.590447060506432!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sng!4v1774891843996!5m2!1sen!2sng"
                  width="600" height="450" style="border:0;" allowlscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <form class="contact-form">
                <label for="name">Name</label>
                <input type="text" placeholder="Fullname">

                <label for="email">Email</label>
                <input type="email" placeholder="email">

                <p>Message Purpose</p>
                <label for="purpose"><input type="radio" name="purpose"> General Inquiry</label>
                <label for="purpose"><input type="radio" name="purpose"> Reservation
                    Question</label>
                <label for="purpose"><input type="radio" name="purpose"> Website Suggestion</label>

                <label for="message">Message</label>
                <textarea placeholder="Type here"></textarea>

                <label class="checkbox">
                    <input type="checkbox"> Please Subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>
            </form>

        </section>


        <section class="team">
            <h2>We Are Here to Serve You</h2>

            <div class="team-grid">
                <div class="card">
                    <div class="img">
                        <img src="images/worker1.jpeg" alt="worker1" width="80">
                    </div>
                    <p>Employee Profile</p>
                </div>

                <div class="card">
                    <div class="img">
                        <img src="images/worker2.jpeg" alt="worker2" width="80">
                    </div>
                    <p>Employee Profile</p>
                </div>

                <div class="card">

                        <img src="images/worker3.jpeg" alt="worker3" width="80">
                    </div>

                </div>
            </div>
